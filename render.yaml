services:
  - type: web
    name: prompt-to-agent-orchestrator
    env: docker
    region: oregon # Or choose your preferred region
    plan: free # Can be upgraded to 'starter' etc.

    envVars:
      - key: MISTRAL_API_KEY
        sync: false # Requires you to input this value manually in the Render dashboard for security
      - key: TAVILY_API_KEY
        sync: false
        optional: true
